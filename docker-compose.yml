services:
  redis:
    image: redis:7-alpine

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
